{% extends "layouts/base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Student Directory</h2>
        <a href="{% url 'student_add' %}" class="btn btn-success">Add Student</a>
    </div>
    
    <div class="table-responsive shadow rounded">
        <table class="table table-hover bg-white m-0">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>City/Addresses</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.name }}</td>
                    <td>{{ student.age }}</td>
                   <td>{{ student.addresses|default:"No Address Provided" }}</td>
                    <td class="text-center">
                        <a href="{% url 'student_update' student.id %}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="{% url 'student_delete' student.id %}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
