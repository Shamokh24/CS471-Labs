{% extends "layouts/base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Student Profiles</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Image</th>
            </tr>
        </thead>
        <tbody>
            {% for profile in profiles %}
            <tr>
                <td>{{ profile.student_name }}</td>
                <td>
                    {% if profile.profile_image %}
                        <img src="{{ profile.profile_image.url }}" alt="Profile" style="width: 100px;">
                    {% else %}
                        No Image
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
