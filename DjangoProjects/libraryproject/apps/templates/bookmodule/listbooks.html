{% extends "layouts/base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Lab9 Part 1: CRUD operations and Template organization (without using Django forms)</h2>
        <a href="{% url 'add_book' %}" class="btn btn-success">+ Add New Book</a>
    </div>

    <div class="table-responsive shadow rounded">
        <table class="table table-hover bg-white m-0">
            <thead class="table-dark">
                <tr>
                    <th style="width: 10%;">ID</th>
                    <th>Title</th>
                    <th style="width: 20%;" class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for b in books %}
                <tr>
                    <td>{{ b.id }}</td>
                    <td>{{ b.title }}</td>
                    <td class="text-center">
                        <a href="{% url 'edit_book' b.id %}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="{% url 'delete_book' b.id %}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted">No books in the database.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
