{% extends "layouts/base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Add Book (without using Django forms)</h2>
    <form method="post" class="shadow p-4 bg-white rounded">
        {% csrf_token %}
        <div class="mb-3">
            <label for="title" class="form-label">Title:</label>
            <input type="text" name="title" id="title" class="form-control" placeholder="Enter book title" required>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Price:</label>
            <input type="number" step="0.01" name="price" id="price" class="form-control" value="0.0" required>
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity:</label>
            <input type="number" name="quantity" id="quantity" class="form-control" value="1" required>
        </div>
        <div class="mb-3">
            <label for="pubdate" class="form-label">Pubdate:</label>
            <input type="datetime-local" name="pubdate" id="pubdate" class="form-control">
        </div>
        <div class="mb-3">
            <label for="publisher" class="form-label">Publisher:</label>
            <select name="publisher" id="publisher" class="form-select">
                <option value="">---------</option>
                {% for pub in publishers %}
                    <option value="{{ pub.id }}">{{ pub.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="authors" class="form-label">Authors:</label>
            <select name="authors" id="authors" class="form-select" multiple style="height: 150px;">
                {% for author in all_authors %}
                    <option value="{{ author.id }}">{{ author.name }}</option>
                {% endfor %}
            </select>
            <small class="text-muted">Hold Ctrl (Windows) or Command (Mac) to select multiple.</small>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Save Book</button>
            <a href="{% url 'list_books' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
