{% extends "layouts/base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Lab 9 Part 2: CRUD operations with validation (using Django forms)</h2>
        <a href="{% url 'add_book_p2' %}" class="btn btn-success">+ Add New Book</a>
    </div>

    <div class="table-responsive shadow rounded">
        <table class="table table-hover bg-white m-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td>{{ book.id }}</td>
                    <td>{{ book.title }}</td>
                    <td class="text-center">
                        <a href="{% url 'edit_book_p2' book.id %}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="{% url 'delete_book_p2' book.id %}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No books found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
